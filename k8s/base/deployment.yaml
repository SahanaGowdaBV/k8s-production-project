apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: app
        image: YOUR_DOCKER/devops-app:latest
        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
